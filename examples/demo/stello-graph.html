<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stello 星空图 - 什么是好的思考？</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0a0e27;
      color: #e0e0e0;
      overflow: hidden;
    }
    #canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      background: radial-gradient(ellipse at center, #1a1f3a 0%, #0a0e27 100%);
    }
    #info {
      position: absolute;
      top: 20px;
      left: 20px;
      background: rgba(26, 31, 58, 0.9);
      padding: 20px;
      border-radius: 12px;
      max-width: 300px;
      border: 1px solid rgba(126, 200, 227, 0.3);
    }
    h1 {
      font-size: 20px;
      margin-bottom: 10px;
      color: #7EC8E3;
    }
    .stats {
      font-size: 14px;
      line-height: 1.6;
      color: #b0b0b0;
    }
    .legend {
      margin-top: 15px;
      padding-top: 15px;
      border-top: 1px solid rgba(126, 200, 227, 0.2);
    }
    .legend-item {
      display: flex;
      align-items: center;
      margin: 8px 0;
      font-size: 12px;
    }
    .legend-line {
      width: 30px;
      height: 2px;
      margin-right: 10px;
    }
    .solid { background: #7EC8E3; }
    .dashed {
      background: linear-gradient(to right, #FFD700 50%, transparent 50%);
      background-size: 8px 2px;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="info">
    <h1>🌌 什么是好的思考？</h1>
    <div class="stats">
      <div>📊 Session 数量: 6</div>
      <div>🌳 最大深度: 2</div>
      <div>🔗 引用关系: 1</div>
    </div>
    <div class="legend">
      <div class="legend-item">
        <div class="legend-line solid"></div>
        <span>父子关系</span>
      </div>
      <div class="legend-item">
        <div class="legend-line dashed"></div>
        <span>跨分支引用</span>
      </div>
    </div>
  </div>

  <script>
    const data = {
  "sessions": [
    {
      "id": "5d1069ca-3aff-4f6f-ad27-eee4efef849a",
      "label": "创造性思维",
      "parentId": "ed0d910b-bc68-4398-b83a-558fb3d8fbe8",
      "children": [],
      "refs": [
        "c228e859-5703-4afb-8b73-b95bc120db19"
      ],
      "depth": 1,
      "turnCount": 2,
      "lastActiveAt": "2026-03-18T05:25:59.350Z"
    },
    {
      "id": "a0d0ac68-fc45-4df0-b6c8-beea2f01e549",
      "label": "批判性思维",
      "parentId": "b1a59dc8-2319-456c-8d4c-b4cf2a9e4d24",
      "children": [],
      "refs": [],
      "depth": 1,
      "turnCount": 2,
      "lastActiveAt": "2026-03-18T05:22:19.179Z"
    },
    {
      "id": "ab8ae97a-8bb0-4cc3-9905-6548683e0360",
      "label": "逻辑谬误",
      "parentId": "c228e859-5703-4afb-8b73-b95bc120db19",
      "children": [],
      "refs": [],
      "depth": 2,
      "turnCount": 0,
      "lastActiveAt": "2026-03-18T05:26:30.957Z"
    },
    {
      "id": "b1a59dc8-2319-456c-8d4c-b4cf2a9e4d24",
      "label": "什么是好的思考？",
      "parentId": null,
      "children": [
        "a0d0ac68-fc45-4df0-b6c8-beea2f01e549"
      ],
      "refs": [],
      "depth": 0,
      "turnCount": 3,
      "lastActiveAt": "2026-03-18T05:21:28.521Z"
    },
    {
      "id": "c228e859-5703-4afb-8b73-b95bc120db19",
      "label": "批判性思维",
      "parentId": "ed0d910b-bc68-4398-b83a-558fb3d8fbe8",
      "children": [
        "ab8ae97a-8bb0-4cc3-9905-6548683e0360"
      ],
      "refs": [],
      "depth": 1,
      "turnCount": 2,
      "lastActiveAt": "2026-03-18T05:25:15.294Z"
    },
    {
      "id": "ed0d910b-bc68-4398-b83a-558fb3d8fbe8",
      "label": "什么是好的思考？",
      "parentId": null,
      "children": [
        "c228e859-5703-4afb-8b73-b95bc120db19",
        "5d1069ca-3aff-4f6f-ad27-eee4efef849a"
      ],
      "refs": [],
      "depth": 0,
      "turnCount": 3,
      "lastActiveAt": "2026-03-18T05:24:05.244Z"
    }
  ]
};

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      draw();
    }

    // 简单的力导向布局
    const nodes = data.sessions.map((s, i) => ({
      id: s.id,
      label: s.label,
      depth: s.depth,
      parentId: s.parentId,
      refs: s.refs,
      x: canvas.width / 2 + (i - 2) * 200,
      y: 100 + s.depth * 200,
      vx: 0,
      vy: 0,
      radius: 30 + s.turnCount * 5,
    }));

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // 绘制连线
      nodes.forEach(node => {
        // 父子关系 (实线)
        if (node.parentId) {
          const parent = nodes.find(n => n.id === node.parentId);
          if (parent) {
            ctx.strokeStyle = 'rgba(126, 200, 227, 0.6)';
            ctx.lineWidth = 2;
            ctx.setLineDash([]);
            ctx.beginPath();
            ctx.moveTo(parent.x, parent.y);
            ctx.lineTo(node.x, node.y);
            ctx.stroke();
          }
        }

        // 引用关系 (虚线)
        node.refs.forEach(refId => {
          const refNode = nodes.find(n => n.id === refId);
          if (refNode) {
            ctx.strokeStyle = 'rgba(255, 215, 0, 0.8)';
            ctx.lineWidth = 2;
            ctx.setLineDash([10, 5]);
            ctx.beginPath();
            ctx.moveTo(node.x, node.y);
            ctx.lineTo(refNode.x, refNode.y);
            ctx.stroke();
          }
        });
      });

      // 绘制节点
      nodes.forEach(node => {
        // 光晕
        const gradient = ctx.createRadialGradient(node.x, node.y, 0, node.x, node.y, node.radius + 20);
        gradient.addColorStop(0, node.depth === 0 ? 'rgba(255, 215, 0, 0.3)' : 'rgba(126, 200, 227, 0.2)');
        gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.arc(node.x, node.y, node.radius + 20, 0, Math.PI * 2);
        ctx.fill();

        // 节点主体
        ctx.fillStyle = node.depth === 0 ? '#FFD700' : '#7EC8E3';
        ctx.beginPath();
        ctx.arc(node.x, node.y, node.radius, 0, Math.PI * 2);
        ctx.fill();

        // 节点边框
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.8)';
        ctx.lineWidth = 2;
        ctx.setLineDash([]);
        ctx.stroke();

        // 节点标签
        ctx.fillStyle = '#ffffff';
        ctx.font = '14px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(node.label, node.x, node.y + node.radius + 25);

        // 深度标记
        ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
        ctx.font = '10px sans-serif';
        ctx.fillText(`depth ${node.depth}`, node.x, node.y + node.radius + 40);
      });
    }

    window.addEventListener('resize', resize);
    resize();

    // 简单的鼠标交互
    let hoveredNode = null;
    canvas.addEventListener('mousemove', (e) => {
      const rect = canvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;

      hoveredNode = nodes.find(n => {
        const dx = x - n.x;
        const dy = y - n.y;
        return Math.sqrt(dx * dx + dy * dy) < n.radius;
      });

      canvas.style.cursor = hoveredNode ? 'pointer' : 'default';
    });

    canvas.addEventListener('click', () => {
      if (hoveredNode) {
        alert(`Session: ${hoveredNode.label}\nDepth: ${hoveredNode.depth}\nID: ${hoveredNode.id}`);
      }
    });
  </script>
</body>
</html>
